version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_password
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    secrets:
      - grafana_admin_password
    ports:
      - "3000:3000"
    networks:
      - monitoring
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - monitoring
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.20'
          memory: 128M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    command:
      - '--docker_only=true'
      - '--docker=unix:///var/run/docker.sock'
      - '--housekeeping_interval=30s'
      # Tránh lỗi đọc layerdb/disk trên Docker Engine mới.
      - '--disable_metrics=disk,diskIO'
      # Giữ Docker metadata để Prometheus/Grafana có thể thấy container name/image/labels.
      - '--store_container_labels=true'
      - '--allow_dynamic_housekeeping=true'
    volumes:
      # rslave giúp cAdvisor nhìn được mount namespace/container mounts của host trong Docker/Swarm mới.
      - /:/rootfs:ro,rslave
      - /proc:/host/proc:ro
      - /sys:/sys:ro,rslave
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/lib/docker:/var/lib/docker:ro,rslave
      # Mount cả /var/run để Docker API socket và runtime socket giữ đúng layout như trên host.
      - /var/run:/var/run:ro
      # Cho phép cAdvisor đọc OOM/kernel message; chỉ read-only, không ghi vào host.
      - /dev/kmsg:/dev/kmsg:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - "8081:8080"
    networks:
      - monitoring
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.30'
          memory: 256M

networks:
  monitoring:
    driver: overlay

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

secrets:
  grafana_admin_password:
    external: true
