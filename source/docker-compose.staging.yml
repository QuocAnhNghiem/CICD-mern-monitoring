version: '3.8'

services:
  frontend:
    image: ${HARBOR_HOST}/mern/frontend:${IMAGE_TAG:-latest}
    ports:
      - "81:8080"
    networks:
      - frontend-net
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
      placement:
        constraints:
          - node.labels.env == worker
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    image: ${HARBOR_HOST}/mern/backend:${IMAGE_TAG:-latest}
    ports:
      - "5001:5000"
    env_file:
      - ./source/backend/.env.staging
    networks:
      - frontend-net
      - backend-net
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
      placement:
        constraints:
          - node.labels.env == worker
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  db-staging:
    image: mongo:6.0
    volumes:
      - mongo_staging_data:/data/db
    networks:
      - backend-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
      placement:
        constraints:
          - node.labels.env == worker
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  frontend-net:
    driver: overlay
  backend-net:
    driver: overlay

volumes:
  mongo_staging_data:
    driver: local
